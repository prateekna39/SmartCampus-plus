<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartCampus+ Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .wrapper { display: flex; width: 900px; min-height: 500px; background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6); overflow: hidden; z-index: 10; position: relative;}
        .left-panel { flex: 1; background: linear-gradient(135deg, rgba(37, 99, 235, 0.8), rgba(56, 189, 248, 0.8)); padding: 60px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden;}
        .left-panel::before { content:''; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 60%); animation: rotate 20s linear infinite;}
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .left-panel h1 { font-size: 42px; margin: 0 0 15px 0; font-weight: 700; letter-spacing: -1px; position:relative; z-index:2;}
        .left-panel p { font-size: 18px; opacity: 0.9; margin: 0; line-height: 1.6; position:relative; z-index:2;}
        .right-panel { flex: 1; padding: 60px; display: flex; flex-direction: column; justify-content: center; }
        .right-panel h2 { margin: 0 0 30px 0; color: #38bdf8; font-size: 32px; font-weight: 700; }
        .toggle-link { display: block; margin-top: 25px; text-align: center; font-size: 15px; color: #cbd5e1; }
        .toggle-link span { color: #38bdf8; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .toggle-link span:hover { color: white; text-shadow: 0 0 10px #38bdf8;}
        .error-box { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.5); color: #fca5a5; padding: 15px; border-radius: 10px; margin-bottom: 25px; font-weight: 600; text-align: center; }
        body { display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="bg-shapes"><div class="shape shape-1"></div><div class="shape shape-2"></div><div class="shape shape-3"></div></div>

<div class="wrapper">
    <div class="left-panel">
        <h1>SmartCampus+</h1>
        <p>Your unified digital campus hub. Access food, classrooms, library seats, and events in one seamless experience.</p>
    </div>
    <div class="right-panel">
        {% if error %}<div class="error-box">{{ error }}</div>{% endif %}
        <div id="signin-box">
            <h2>Sign In</h2>
            <form action="/login" method="POST">
                <input class="clean-input" type="text" name="username" placeholder="Username" required>
                <input class="clean-input" type="password" name="password" placeholder="Password" required>
                <button class="action-btn btn-blue" type="submit" style="width: 100%; padding: 15px; font-size: 16px;">Login to Campus</button>
            </form>
            <div class="toggle-link">New here? <span onclick="toggleForm()">Sign up as a Student</span></div>
        </div>
        <div id="signup-box" style="display: none;">
            <h2 style="color: #10b981;">Register Student</h2>
            <form action="/register" method="POST">
                <input class="clean-input" type="text" name="new_username" placeholder="Choose Username" required>
                <input class="clean-input" type="password" name="new_password" placeholder="Choose Password" required>
                <button class="action-btn btn-green" type="submit" style="width: 100%; padding: 15px; font-size: 16px;">Create Account</button>
            </form>
            <div class="toggle-link">Already have an account? <span onclick="toggleForm()">Sign In</span></div>
        </div>
    </div>
</div>

<script>
    function toggleForm() {
        const signin = document.getElementById('signin-box');
        const signup = document.getElementById('signup-box');
        if (signin.style.display === 'none') { signin.style.display = 'block'; signup.style.display = 'none'; } 
        else { signin.style.display = 'none'; signup.style.display = 'block'; }
    }
</script>
</body>
</html>
